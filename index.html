<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Elevador SESI</title>
</head>
<body >
    <main>
        <h1>Sesi Elevador</h1>
        <div id="sistema">SISTEMA OK</div>

        <p>Carga Atual: <span id="numero-carga">0</span>kg</p>

        <div id="botoes">
            <button class="btn" id="btn-adicionar" onclick="Adicionar()">
                Adicionar 100kg
            </button>
            <button class="btn" id="btn-tirar" onclick="Retirar()">
                Retirar 100kg
            </button>
            <button class="btn" id="btn-zerar" onclick="Resetar()">
                Resetar Sistema
            </button>
        </div>

    </main>
</body>
</html>
